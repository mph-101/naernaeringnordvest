name: Jobbytte – weekly full sync

on:
  schedule:
    # Sundays at 04:00 UTC. Full per-kommune sweep of every AS/ASA/SA in the
    # county: refreshes the fylke15_companies membership set and acts as a
    # safety net that catches any role change the daily updates feed missed.
    - cron: "0 4 * * 0"
  workflow_dispatch: {}

concurrency:
  # Same group as the daily run so a full sweep and an incremental run never
  # overlap (they share snapshot/state tables).
  group: jobbytte
  cancel-in-progress: false

jobs:
  full-sync:
    name: Full role sweep of Møre og Romsdal
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run jobbytte diff (full)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JOBBYTTE_MODE: full
        run: python scripts/jobbytte_diff.py
