name: Jobbytte – daily role change detector

on:
  schedule:
    # Weekdays at 06:00 UTC (08:00 CEST)
    - cron: "0 6 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: jobbytte
  cancel-in-progress: false

jobs:
  detect:
    name: Detect role changes in Møre og Romsdal
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run jobbytte diff
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/jobbytte_diff.py
